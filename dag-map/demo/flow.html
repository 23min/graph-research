      if (!hasMetric && isGate) {
        svg += `<circle cx="${pos.x.toFixed(1)}" cy="${pos.y.toFixed(1)}" r="${2.2 * s}" fill="${col.cls('gate')}" opacity="${isDim ? dO * 0.6 : 0.4}"/>`;
      }

      // Metric label (rendered above the node)
      if (hasMetric && metric.label) {
        svg += `<text x="${pos.x.toFixed(1)}" y="${(pos.y - r - 2 * s).toFixed(1)}" `;
        svg += `font-size="${3.5 * s}" fill="${col.ink}" text-anchor="middle" opacity="${isDim ? dO * 0.8 : 0.8}">${esc(metric.label)}</text>`;
      }

      const fs = labelSize * s;
      const labelOpacity = isDim ? dO * 0.8 : 0.55;
      if (diagonalLabels) {
        const tickLen = 6 * s;
        const angle = -labelAngle;
        const rad = angle * Math.PI / 180;
        const tickEndX = pos.x + Math.cos(rad) * tickLen;
        const tickEndY = pos.y + Math.sin(rad) * tickLen;
        svg += `<line x1="${pos.x.toFixed(1)}" y1="${(pos.y - r).toFixed(1)}" `;
        svg += `x2="${tickEndX.toFixed(1)}" y2="${(tickEndY - r).toFixed(1)}" `;
        svg += `stroke="${col.ink}" stroke-width="${0.6 * s}" opacity="${isDim ? dO * 0.4 : 0.3}"/>`;
        const textX = tickEndX + 1 * s;
        const textY = tickEndY - r - 1 * s;
        svg += `<text x="${textX.toFixed(1)}" y="${textY.toFixed(1)}" `;
        svg += `font-size="${fs * 0.9}" fill="${col.ink}" text-anchor="start" opacity="${labelOpacity}" `;
        svg += `transform="rotate(${angle} ${textX.toFixed(1)} ${textY.toFixed(1)})">${esc(nd.label)}</text>`;
      } else if (layout.orientation === 'ttb') {
        const labelX = pos.x + r + 4 * s;
        const labelY = pos.y + fs * 0.35;
        svg += `<text x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}" `;
        svg += `font-size="${fs}" fill="${col.ink}" text-anchor="start" opacity="${labelOpacity}">${esc(nd.label)}</text>`;
      } else {
        const labelY = pos.y + r + 8 * s;
        svg += `<text x="${pos.x.toFixed(1)}" y="${labelY.toFixed(1)}" `;
        svg += `font-size="${fs}" fill="${col.ink}" text-anchor="middle" opacity="${labelOpacity}">${esc(nd.label)}</text>`;
      }

      svg += `</g>\n`;
    }
  });

  // Legend
  if (showLegend) {
    const ly = height - 55 * s;
    svg += `<line x1="${24 * s}" y1="${ly}" x2="${width - 24 * s}" y2="${ly}" stroke="${col.border}" stroke-width="${0.3 * s}"/>\n`;

    // Derive legend entries from theme classes
    const classKeys = Object.keys(theme.classes);
    classKeys.forEach((cls, i) => {
      const label = legendLabels[cls] || cls;
      const color = col.cls(cls);
      const x = 24 * s + i * 160 * s;
      svg += `<line x1="${x}" y1="${ly + 16 * s}" x2="${x + 22 * s}" y2="${ly + 16 * s}" stroke="${color}" stroke-width="${3.5 * s}" opacity="0.5" stroke-linecap="round"`;
      if (cls === 'gate') svg += ` stroke-dasharray="${4 * s},${3 * s}"`;
      svg += `/>\n`;
      svg += `<text x="${x + 28 * s}" y="${ly + 19 * s}" font-size="${6.5 * s}" fill="${col.muted}">${esc(label)}</text>\n`;
    });

    const vertSpread = layout.maxY - layout.minY;
    svg += `<text x="${24 * s}" y="${ly + 38 * s}" font-size="${6 * s}" fill="${col.muted}">${dag.nodes.length} ops | ${dag.edges.length} edges | ${routes.length} routes | spread: ${vertSpread.toFixed(0)}px | scale: ${s}x</text>\n`;
  }

  svg += `</svg>`;
  return svg;
}

// --- render-flow-station.js ---
// ================================================================
// render-flow-station.js — Station card + edge label renderers
// ================================================================
// Reusable renderers for the flow layout's Celonis-style visuals:
// punched-out dots on the line, rich cards to the side, on-line badges.

/** Escape user-supplied strings for safe SVG/XML interpolation. */
function esc(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/**
 * Create a station (node) renderer for flow layouts.
 * @param {object} layout - result from layoutFlow()
 * @param {Array} routes - route definitions [{id, cls, nodes}]
 * @returns {function} renderNode(node, pos, ctx) => SVG string
 */
function createStationRenderer(layout, routes) {
  return function renderStation(node, pos, ctx) {
    const s = ctx.scale;
    const dotR = 3.2 * s;
    const fsLabel = layout.labelSize || 3.6 * s;
    const fsData = fsLabel * 0.78;
    const isDim = node.dim === true;
    const dimOp = isDim ? 0.25 : 1;
    let svg = '';

    const routeIndices = [];
    routes.forEach((route, ri) => {
      if (route.nodes.includes(node.id)) routeIndices.push(ri);
    });

    const dotCoords = routeIndices.map(ri =>
      layout.dotPos ? layout.dotPos(node.id, ri) : { x: layout.dotX(node.id, ri), y: pos.y }
    );

    // Punched-out dots ON the line
    routeIndices.forEach((ri, i) => {
      const col = ctx.theme.classes[routes[ri].cls];
      if (!col) return;
      svg += `<circle cx="${dotCoords[i].x}" cy="${dotCoords[i].y}" r="${dotR}" fill="${col}"${isDim ? ` opacity="${dimOp}"` : ''}/>`;
      svg += `<circle cx="${dotCoords[i].x}" cy="${dotCoords[i].y}" r="${dotR * 0.35}" fill="${ctx.theme.paper}"${isDim ? ` opacity="${dimOp}"` : ''}/>`;
    });

    // Card from layout's obstacle-aware placement
    const cp = layout.cardPlacements?.get(node.id);
    if (cp) {
      const { rect, cardPadX, cardPadY } = cp;

      svg += `<rect x="${rect.x}" y="${rect.y}" width="${rect.w}" height="${rect.h}" rx="${2.5 * s}" `;
      svg += `fill="${ctx.theme.paper}" stroke="${ctx.theme.muted}" stroke-width="${0.7 * s}"${isDim ? ` opacity="${dimOp}"` : ''}/>`;

      const labelY = rect.y + cardPadY + fsLabel * 0.85;
      svg += `<text x="${rect.x + cardPadX}" y="${labelY}" font-size="${fsLabel}" fill="${ctx.theme.ink}" text-anchor="start" font-weight="500"${isDim ? ` opacity="${dimOp * 0.8}"` : ''}>${esc(node.label)}</text>`;

      const dataY = labelY + fsData + 3 * s;
      let dx = rect.x + cardPadX;
      routeIndices.forEach(ri => {
        const col = ctx.theme.classes[routes[ri].cls];
        if (!col) return;
        svg += `<rect x="${dx}" y="${dataY - fsData * 0.7}" width="${3.5 * s}" height="${3.5 * s}" rx="${0.5 * s}" fill="${col}"${isDim ? ` opacity="${dimOp}"` : ''}/>`;
        dx += 5 * s;
      });
      const metricValue = node.times ?? node.count;
      if (metricValue !== undefined && metricValue !== null) {
        svg += `<text x="${dx + 2 * s}" y="${dataY}" font-size="${fsData}" fill="${ctx.theme.muted}" text-anchor="start"${isDim ? ` opacity="${dimOp * 0.8}"` : ''}>${esc(String(metricValue))}</text>`;
      }
    }

    return svg;
  };
}

/**
 * Create an edge renderer that draws route paths + on-line volume badges.
 * @param {object} layout - result from layoutFlow()
 * @param {Map<string,string>} [edgeVolumes] - per-route volumes: "ri:from→to" → label
 * @returns {function} renderEdge(edge, segment, ctx) => SVG string
 */
function createEdgeRenderer(layout, edgeVolumes) {
  return function renderEdge(edge, segment, ctx) {
    const s = ctx.scale;
    let svg = '';

    svg += `<path d="${segment.d}" stroke="${segment.color}" stroke-width="${segment.thickness}" fill="none" `;
    svg += `stroke-linecap="round" stroke-linejoin="round" opacity="${segment.opacity}"`;
    if (segment.dashed) svg += ` stroke-dasharray="${4 * s},${3 * s}"`;
    svg += `/>`;

    // Extra edges: draw station-sized dots at start and end
    if (ctx.isExtraEdge && layout.extraDotPositions) {
      // Find matching extra edge positions
      for (const [key, pos] of layout.extraDotPositions) {
        // Match by checking if this segment's path starts at the expected position
        const startM = segment.d.match(/^M\s+(-?[\d.]+)\s+(-?[\d.]+)/);
        if (!startM) continue;
        const mx = parseFloat(startM[1]), my = parseFloat(startM[2]);
        if (Math.abs(mx - pos.fromX) < 1 && Math.abs(my - pos.fromY) < 1) {
          const dotR = 3.2 * s;
          // Punched-out dots matching route station style, but in muted color
          svg += `<circle cx="${pos.fromX}" cy="${pos.fromY}" r="${dotR}" fill="${ctx.theme.muted}"/>`;
          svg += `<circle cx="${pos.fromX}" cy="${pos.fromY}" r="${dotR * 0.35}" fill="${ctx.theme.paper}"/>`;
          svg += `<circle cx="${pos.toX}" cy="${pos.toY}" r="${dotR}" fill="${ctx.theme.muted}"/>`;
          svg += `<circle cx="${pos.toX}" cy="${pos.toY}" r="${dotR * 0.35}" fill="${ctx.theme.paper}"/>`;
          break;
        }
      }
    }

    if (edgeVolumes && !ctx.isExtraEdge && edge && ctx.routeIndex !== undefined) {
      const ri = ctx.routeIndex;
      const routeEdgeKey = `${ri}:${edge.from}\u2192${edge.to}`;
      const vol = edgeVolumes.get(routeEdgeKey);

      if (vol) {
        const labelPos = layout.edgeLabelPositions?.get(routeEdgeKey);
        if (labelPos) {
          const fs = (layout.labelSize || 3.6 * s) * 0.67;
          const tw = vol.length * fs * 0.55 + 3.5 * s;
          const th = fs + 2.5 * s;

          svg += `<rect x="${labelPos.x - tw / 2}" y="${labelPos.y - th / 2}" width="${tw}" height="${th}" rx="${1.5 * s}" `;
          svg += `fill="${ctx.theme.paper}" stroke="${labelPos.color}" stroke-width="${0.5 * s}" opacity="0.9"/>`;
          svg += `<text x="${labelPos.x}" y="${labelPos.y + fs * 0.35}" font-size="${fs}" fill="${labelPos.color}" text-anchor="middle" opacity="0.9">${esc(vol)}</text>`;
        }
      }
    }

    return svg;
  };
}

function mkModel(id, label, subtitle, nodes, edges, routes, opts) {
  // Auto-generate edge volumes from node counts for demo purposes.
  // For each route, each consecutive pair gets a volume derived from
  // the source node's count (if available).
  var edgeVolumes = new Map();
  routes.forEach(function(r, ri) {
    for (var i = 1; i < r.nodes.length; i++) {
      var fromNode = nodes.find(function(n) { return n[0] === r.nodes[i - 1]; });
      var vol = fromNode && fromNode[2] ? fromNode[2] : '';
      if (vol) edgeVolumes.set(ri + ':' + r.nodes[i - 1] + '\u2192' + r.nodes[i], vol);
    }
  });

  return {
    id, label, subtitle,
    dag: {
      nodes: nodes.map(n => ({ id: n[0], label: n[1], count: n[2] || '' })),
      edges,
    },
    routes: routes.map(r => ({ id: r.id, cls: r.cls, nodes: r.nodes })),
    edgeVolumes,
    theme: { ...palette, classes: Object.fromEntries(routes.map(r => [r.cls, palette.classes[r.cls]])) },
    opts: { scale: 1.8, layerSpacing: 50, columnSpacing: 70, dotSpacing: 12, cornerRadius: 5, lineThickness: 3, labelSize: 4.2, ...opts },
  };
}

// Syntax highlight (matches dag.html style)
function highlight(src) {
  return src
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\/\/(.*)/g, '<span style="color:var(--dm-muted)">//$1</span>')
    .replace(/\b(import|from|const|let|var)\b/g, '<span style="color:#CF222E">$1</span>')
    .replace(/\b(layoutFlow|renderSVG|createStationRenderer|createEdgeRenderer)\b/g, '<span style="color:#8250DF">$1</span>')
    .replace(/\b(dag|layout|routes|theme|svg)\b/g, '<span style="color:#953800">$1</span>')
    .replace(/"([^"]+)"\s*:/g, '<span style="color:#0550AE">"$1"</span>:')
    .replace(/:\s*"([^"]+)"/g, ': <span style="color:#0A3069">"$1"</span>')
    .replace(/:\s*(true|false)/g, ': <span style="color:#CF222E">$1</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#0550AE">$1</span>');
}
function highlightJSON(src) {
  return src
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)"\s*:/g, '<span style="color:#0550AE">"$1"</span>:')
    .replace(/:\s*"([^"]+)"/g, ': <span style="color:#0A3069">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#0550AE">$1</span>')
    .replace(/\[/g, '<span style="color:var(--dm-muted)">[</span>')
    .replace(/\]/g, '<span style="color:var(--dm-muted)">]</span>');
}

function getOpts() {
  const o = {};
  for (const [k, s] of Object.entries(sliders)) o[k] = parseFloat(s.el.value);
  return o;
}

function doRender() {
  const idx = parseInt($model.value, 10);
  const model = models[idx];
  const opts = getOpts();
  const themeName = $theme.value;

  // Update slider value displays
  for (const [k, s] of Object.entries(sliders)) s.val.textContent = s.el.value;

  // Map route class keys (a, b, c...) to colors from the selected theme.
  // The 'dark' theme uses the model's curated palette; other themes derive
  // route colors from their own class palette (cycling through 4 colors).
  const baseTheme = resolveTheme(themeName);
  let routeClassColors;
  if (themeName === 'dark') {
    routeClassColors = model.theme.classes;
  } else {
    const themeColors = Object.values(baseTheme.classes);
    routeClassColors = {};
    model.routes.forEach((r, i) => { routeClassColors[r.cls] = themeColors[i % themeColors.length]; });
  }
  const theme = { ...baseTheme, classes: { ...baseTheme.classes, ...routeClassColors } };

  // Update CSS custom properties so controls, code block, etc. follow the theme
  const root = document.documentElement.style;
  root.setProperty('--dm-paper', theme.paper);
  root.setProperty('--dm-ink', theme.ink);
  root.setProperty('--dm-muted', theme.muted);
  root.setProperty('--dm-border', theme.border);

  try {
    const direction = $direction.value;
    document.getElementById('splitContainer').classList.toggle('dm-ltr', direction === 'ltr');
    const layout = layoutFlow(model.dag, { routes: model.routes, theme, direction, ...opts });
    const renderNode = createStationRenderer(layout, model.routes);
    const renderEdge = createEdgeRenderer(layout, model.edgeVolumes);
    const svg = renderSVG(model.dag, layout, {
      title: model.label,
      subtitle: model.subtitle || '',
      font: "'Inter', 'Segoe UI', system-ui, sans-serif",
      showLegend: false,
      renderNode,
      renderEdge,
    });
    $container.innerHTML = svg;

    // JS panel — the call you'd write
    var jsCode = "import { layoutFlow } from 'dag-map';\n"
      + "import { renderSVG } from 'dag-map';\n"
      + "import { createStationRenderer, createEdgeRenderer }\n"
      + "  from 'dag-map/render-flow-station';\n\n"
      + 'const layout = layoutFlow(dag, {\n'
      + '  routes,\n'
      + (direction !== 'ttb' ? '  direction: ' + JSON.stringify(direction) + ',\n' : '')
      + '  theme: ' + JSON.stringify(themeName) + ',\n'
      + Object.entries(opts).map(([k, v]) => '  ' + k + ': ' + v + ',').join('\n')
      + '\n});\n\n'
      + 'const renderNode = createStationRenderer(layout, routes);\n'
      + 'const renderEdge = createEdgeRenderer(layout);\n'
      + 'const svg = renderSVG(dag, layout, {\n'
      + '  renderNode,\n'
      + '  renderEdge,\n'
      + '  showLegend: false,\n'
      + '});';
    $jsBlock.innerHTML = highlight(jsCode);

    // JSON panel — the model data
    var jsonData = {
      nodes: model.dag.nodes.map(function(n) { return { id: n.id, label: n.label }; }),
      edges: model.dag.edges,
      routes: model.routes.map(function(r) { return { id: r.id, cls: r.cls, nodes: r.nodes }; }),
    };
    $jsonBlock.innerHTML = highlightJSON(JSON.stringify(jsonData, null, 2));
  } catch (err) {
    $container.innerHTML = '<pre style="color:red;padding:24px">' + err.message + '\n' + err.stack + '</pre>';
  }
}

function onModelChange() {
  const idx = parseInt($model.value, 10);
  const defaults = models[idx].opts;
  for (const [k, s] of Object.entries(sliders)) {
    if (defaults[k] !== undefined) { s.el.value = defaults[k]; s.val.textContent = defaults[k]; }
  }
  doRender();
}

$model.addEventListener('change', onModelChange);
$direction.addEventListener('change', doRender);
$theme.addEventListener('change', doRender);
for (const s of Object.values(sliders)) s.el.addEventListener('input', doRender);

// Initial render
onModelChange();
</script>
</body>
</html>
