<script>
// ============================================================
// dag-map Hasse standalone — all modules inlined
// ============================================================

// --- themes.js ---
var THEMES = {
  cream: {
    paper: '#F5F0E8', ink: '#2C2C2C', muted: '#8C8680', border: '#D4CFC7',
    classes: { pure: '#2B8A8E', recordable: '#E8846B', side_effecting: '#D4944C', gate: '#C45B4A' }
  },
  light: {
    paper: '#FAFAFA', ink: '#333333', muted: '#999999', border: '#E0E0E0',
    classes: { pure: '#0077B6', recordable: '#E36414', side_effecting: '#6C757D', gate: '#DC3545' }
  },
  dark: {
    paper: '#1E1E2E', ink: '#CDD6F4', muted: '#6C7086', border: '#313244',
    classes: { pure: '#94E2D5', recordable: '#F38BA8', side_effecting: '#F9E2AF', gate: '#EBA0AC' }
  },
  blueprint: {
    paper: '#1B2838', ink: '#E0E8F0', muted: '#5A7A9A', border: '#2A4060',
    classes: { pure: '#4FC3F7', recordable: '#FF8A65', side_effecting: '#FFD54F', gate: '#EF5350' }
  },
  mono: {
    paper: '#FFFFFF', ink: '#1A1A1A', muted: '#888888', border: '#CCCCCC',
    classes: { pure: '#444444', recordable: '#777777', side_effecting: '#999999', gate: '#333333' }
  },
  metro: {
    paper: '#FFFFFF', ink: '#1A1A1A', muted: '#9E9E9E', border: '#D4EAF7',
    classes: { pure: '#0078C8', recordable: '#E3242B', side_effecting: '#F5A623', gate: '#6A2D8E' },
    lineOpacity: 1.4
  }
};

function resolveTheme(themeOption) {
  if (!themeOption || themeOption === 'cream') return THEMES.cream;
  if (typeof themeOption === 'string') return THEMES[themeOption] || THEMES.cream;
  return { ...THEMES.cream, ...themeOption, classes: { ...THEMES.cream.classes, ...(themeOption.classes || {}) } };
}

// --- layout-hasse.js ---
function buildGraph(nodes, edges) {
  var nodeMap = new Map(nodes.map(function(n) { return [n.id, n]; }));
  var childrenOf = new Map();
  var parentsOf = new Map();
  nodes.forEach(function(n) { childrenOf.set(n.id, []); parentsOf.set(n.id, []); });
  edges.forEach(function(e) {
    childrenOf.get(e[0]).push(e[1]);
    parentsOf.get(e[1]).push(e[0]);
  });
  return { nodeMap: nodeMap, childrenOf: childrenOf, parentsOf: parentsOf };
}

function topoSortAndRank(nodes, childrenOf, parentsOf) {
  var rank = new Map();
  var inDeg = new Map();
  nodes.forEach(function(nd) { inDeg.set(nd.id, parentsOf.get(nd.id).length); });
  var queue = nodes.filter(function(nd) { return inDeg.get(nd.id) === 0; }).map(function(nd) { return nd.id; });
  queue.forEach(function(id) { rank.set(id, 0); });
  var topo = [];
  while (queue.length) {
    var u = queue.shift(); topo.push(u);
    var children = childrenOf.get(u);
    for (var ci = 0; ci < children.length; ci++) {
      var v = children[ci];
      rank.set(v, Math.max(rank.get(v) || 0, rank.get(u) + 1));
      inDeg.set(v, inDeg.get(v) - 1);
      if (inDeg.get(v) === 0) queue.push(v);
    }
  }
  var maxRank = topo.length > 0 ? Math.max.apply(null, topo.map(function(id) { return rank.get(id); })) : 0;
  return { topo: topo, rank: rank, maxRank: maxRank };
}

function insertVirtualNodes(edges, rank, childrenOf, parentsOf) {
  var virtualNodes = [];
  var expandedEdges = [];
  var virtualChains = new Map();
  for (var ei = 0; ei < edges.length; ei++) {
    var from = edges[ei][0], to = edges[ei][1];
    var rFrom = rank.get(from), rTo = rank.get(to);
    var span = rTo - rFrom;
    if (span <= 1) { expandedEdges.push([from, to]); continue; }
    var chain = [];
    var prev = from;
    for (var r = rFrom + 1; r < rTo; r++) {
      var vid = '__v_' + from + '_' + to + '_' + r;
      virtualNodes.push({ id: vid, rank: r });
      chain.push(vid);
      expandedEdges.push([prev, vid]);
      if (!childrenOf.has(vid)) childrenOf.set(vid, []);
      if (!parentsOf.has(vid)) parentsOf.set(vid, []);
      childrenOf.get(prev).push(vid);
      parentsOf.get(vid).push(prev);
      prev = vid;
    }
    expandedEdges.push([prev, to]);
    childrenOf.get(prev).push(to);
    parentsOf.get(to).push(prev);
    virtualChains.set(from + '->' + to, chain);
  }
  for (var vi = 0; vi < virtualNodes.length; vi++) {
    rank.set(virtualNodes[vi].id, virtualNodes[vi].rank);
  }
  return { virtualNodes: virtualNodes, expandedEdges: expandedEdges, virtualChains: virtualChains };
}

function buildLayers(nodeIds, rank, maxRank) {
  var layers = [];
  for (var r = 0; r <= maxRank; r++) layers.push([]);
  for (var i = 0; i < nodeIds.length; i++) {
    var r2 = rank.get(nodeIds[i]);
    if (r2 !== undefined) layers[r2].push(nodeIds[i]);
  }
  return layers;
}

function countCrossings(layers, childrenOf) {
  var total = 0;
  for (var r = 0; r < layers.length - 1; r++) {
    var upper = layers[r], lower = layers[r + 1];
    var posInLower = new Map();
    lower.forEach(function(id, i) { posInLower.set(id, i); });
    var edgePairs = [];
    for (var ui = 0; ui < upper.length; ui++) {
      var ch = childrenOf.get(upper[ui]) || [];
      for (var ci = 0; ci < ch.length; ci++) {
        var li = posInLower.get(ch[ci]);
        if (li !== undefined) edgePairs.push([ui, li]);
      }
    }
    for (var i = 0; i < edgePairs.length; i++) {
      for (var j = i + 1; j < edgePairs.length; j++) {
        if ((edgePairs[i][0] - edgePairs[j][0]) * (edgePairs[i][1] - edgePairs[j][1]) < 0) total++;
      }
    }
  }
  return total;
}

function barycenterSort(layer, getNeighborPositions) {
  var barycenters = new Map();
  for (var i = 0; i < layer.length; i++) {
    var id = layer[i];
    var positions = getNeighborPositions(id);
    if (positions.length > 0) {
      var avg = positions.reduce(function(a, b) { return a + b; }, 0) / positions.length;
      barycenters.set(id, avg);
    } else {
      barycenters.set(id, Infinity);
    }
  }
  var indexed = layer.map(function(id, i) { return { id: id, bc: barycenters.get(id), orig: i }; });
  indexed.sort(function(a, b) { return a.bc !== b.bc ? a.bc - b.bc : a.orig - b.orig; });
  return indexed.map(function(e) { return e.id; });
}

function reduceCrossings(layers, childrenOf, parentsOf, passes) {
  var best = layers.map(function(l) { return l.slice(); });
  var bestCrossings = countCrossings(best, childrenOf);
  var current = layers.map(function(l) { return l.slice(); });
  for (var pass = 0; pass < passes; pass++) {
    if (pass % 2 === 0) {
      for (var r = 1; r < current.length; r++) {
        var upperPos = new Map();
        current[r - 1].forEach(function(id, i) { upperPos.set(id, i); });
        current[r] = barycenterSort(current[r], function(id) {
          var parents = parentsOf.get(id) || [];
          return parents.map(function(p) { return upperPos.get(p); }).filter(function(p) { return p !== undefined; });
        });
      }
    } else {
      for (var r = current.length - 2; r >= 0; r--) {
        var lowerPos = new Map();
        current[r + 1].forEach(function(id, i) { lowerPos.set(id, i); });
        current[r] = barycenterSort(current[r], function(id) {
          var children = childrenOf.get(id) || [];
          return children.map(function(c) { return lowerPos.get(c); }).filter(function(c) { return c !== undefined; });
        });
      }
    }
    var crossings = countCrossings(current, childrenOf);
    if (crossings < bestCrossings) {
      bestCrossings = crossings;
      for (var r = 0; r < current.length; r++) best[r] = current[r].slice();
    }
  }
  return best;
}

function enforceSpacing(layer, x, minSpacing) {
  var sorted = layer.slice().sort(function(a, b) { return x.get(a) - x.get(b); });
  for (var i = 1; i < sorted.length; i++) {
    var prev = x.get(sorted[i - 1]);
    if (x.get(sorted[i]) - prev < minSpacing) x.set(sorted[i], prev + minSpacing);
  }
  for (var i = sorted.length - 2; i >= 0; i--) {
    var next = x.get(sorted[i + 1]);
    if (next - x.get(sorted[i]) < minSpacing) x.set(sorted[i], next - minSpacing);
  }
}

function centerLayers(layers, x) {
  var globalMin = Infinity, globalMax = -Infinity;
  for (var li = 0; li < layers.length; li++) {
    for (var ni = 0; ni < layers[li].length; ni++) {
      var val = x.get(layers[li][ni]);
      if (val < globalMin) globalMin = val;
      if (val > globalMax) globalMax = val;
    }
  }
  var globalCenter = (globalMin + globalMax) / 2;
  for (var li = 0; li < layers.length; li++) {
    var layer = layers[li];
    if (layer.length === 0) continue;
    var layerMin = Infinity, layerMax = -Infinity;
    for (var ni = 0; ni < layer.length; ni++) {
      var val = x.get(layer[ni]);
      if (val < layerMin) layerMin = val;
      if (val > layerMax) layerMax = val;
    }
    var shift = globalCenter - (layerMin + layerMax) / 2;
    for (var ni = 0; ni < layer.length; ni++) x.set(layer[ni], x.get(layer[ni]) + shift);
  }
}

function assignXCoordinates(layers, childrenOf, parentsOf, nodeSpacing) {
  var x = new Map();
  for (var li = 0; li < layers.length; li++) {
    for (var ni = 0; ni < layers[li].length; ni++) x.set(layers[li][ni], ni * nodeSpacing);
  }
  for (var iter = 0; iter < 12; iter++) {
    for (var r = 1; r < layers.length; r++) {
      for (var ni = 0; ni < layers[r].length; ni++) {
        var id = layers[r][ni];
        var neighbors = (parentsOf.get(id) || []).concat(childrenOf.get(id) || []).filter(function(n) { return x.has(n); });
        if (neighbors.length > 0) {
          var avg = neighbors.reduce(function(sum, n) { return sum + x.get(n); }, 0) / neighbors.length;
          x.set(id, avg);
        }
      }
      enforceSpacing(layers[r], x, nodeSpacing);
    }
    for (var r = layers.length - 2; r >= 0; r--) {
      for (var ni = 0; ni < layers[r].length; ni++) {
        var id = layers[r][ni];
        var neighbors = (parentsOf.get(id) || []).concat(childrenOf.get(id) || []).filter(function(n) { return x.has(n); });
        if (neighbors.length > 0) {
          var avg = neighbors.reduce(function(sum, n) { return sum + x.get(n); }, 0) / neighbors.length;
          x.set(id, avg);
        }
      }
      enforceSpacing(layers[r], x, nodeSpacing);
    }
  }
  centerLayers(layers, x);
  return x;
}

function hasseEdgePath(points, edgeStyle) {
  if (points.length < 2) return '';
  if (points.length === 2) {
    var p = points[0], q = points[1];
    var dx = Math.abs(q.x - p.x);
    if (edgeStyle === 'straight' || dx < 2) {
      return 'M ' + p.x + ' ' + p.y + ' L ' + q.x + ' ' + q.y;
    }
    var dy = q.y - p.y;
    return 'M ' + p.x + ' ' + p.y + ' C ' + p.x + ' ' + (p.y + dy * 0.4) + ', ' + q.x + ' ' + (p.y + dy * 0.6) + ', ' + q.x + ' ' + q.y;
  }
  if (edgeStyle === 'straight') {
    var d = 'M ' + points[0].x + ' ' + points[0].y;
    for (var i = 1; i < points.length; i++) d += ' L ' + points[i].x + ' ' + points[i].y;
    return d;
  }
  var d = 'M ' + points[0].x + ' ' + points[0].y;
  for (var i = 1; i < points.length; i++) {
    var p = points[i - 1], q = points[i];
    var dy = q.y - p.y;
    d += ' C ' + p.x + ' ' + (p.y + dy * 0.4) + ', ' + q.x + ' ' + (p.y + dy * 0.6) + ', ' + q.x + ' ' + q.y;
  }
  return d;
}

function layoutHasse(dag, options) {
  options = options || {};
  var theme = resolveTheme(options.theme != null ? options.theme : 'mono');
  var s = options.scale != null ? options.scale : 1.5;
  var rankSpacing = (options.rankSpacing != null ? options.rankSpacing : 80) * s;
  var nodeSpacing = (options.nodeSpacing != null ? options.nodeSpacing : 60) * s;
  var crossingPasses = options.crossingPasses != null ? options.crossingPasses : 24;
  var edgeStyle = options.edgeStyle || 'bezier';

  var nodes = dag.nodes, edges = dag.edges;
  var graph = buildGraph(nodes, edges);
  var nodeMap = graph.nodeMap, childrenOf = graph.childrenOf, parentsOf = graph.parentsOf;
  var result = topoSortAndRank(nodes, childrenOf, parentsOf);
  var topo = result.topo, rank = result.rank, maxRank = result.maxRank;

  var expandedChildren = new Map();
  var expandedParents = new Map();
  childrenOf.forEach(function(v, k) { expandedChildren.set(k, v.slice()); });
  parentsOf.forEach(function(v, k) { expandedParents.set(k, v.slice()); });

  var vResult = insertVirtualNodes(edges, rank, expandedChildren, expandedParents);
  var virtualNodes = vResult.virtualNodes, virtualChains = vResult.virtualChains;
  var allIds = topo.concat(virtualNodes.map(function(v) { return v.id; }));

  var layers = buildLayers(allIds, rank, maxRank);
  layers = reduceCrossings(layers, expandedChildren, expandedParents, crossingPasses);
  var xCoord = assignXCoordinates(layers, expandedChildren, expandedParents, nodeSpacing);

  var topPad = 50 * s, leftPad = 50 * s;
  var minX = Infinity;
  for (var i = 0; i < allIds.length; i++) {
    var val = xCoord.get(allIds[i]);
    if (val < minX) minX = val;
  }
  var xShift = leftPad - minX;

  var allPositions = new Map();
  for (var i = 0; i < allIds.length; i++) {
    var id = allIds[i];
    allPositions.set(id, { x: xCoord.get(id) + xShift, y: topPad + rank.get(id) * rankSpacing });
  }

  var positions = new Map();
  for (var i = 0; i < nodes.length; i++) {
    var pos = allPositions.get(nodes[i].id);
    if (pos) positions.set(nodes[i].id, pos);
  }

  var maxX = 0, maxY = 0, layoutMinY = Infinity, layoutMaxY = -Infinity;
  for (var i = 0; i < nodes.length; i++) {
    var pos = positions.get(nodes[i].id);
    if (!pos) continue;
    if (pos.x > maxX) maxX = pos.x;
    if (pos.y > maxY) maxY = pos.y;
    if (pos.y < layoutMinY) layoutMinY = pos.y;
    if (pos.y > layoutMaxY) layoutMaxY = pos.y;
  }
  var width = maxX + 50 * s;
  var height = maxY + 80 * s;

  var edgeColor = theme.ink;
  var opBoost = theme.lineOpacity || 1.0;
  var edgeThickness = 2.2 * s;
  var edgeOpacity = Math.min(0.35 * opBoost, 1);

  var segments = [];
  for (var ei = 0; ei < edges.length; ei++) {
    var from = edges[ei][0], to = edges[ei][1];
    var chainKey = from + '->' + to;
    var chain = virtualChains.get(chainKey);
    var pathPoints;
    if (chain) {
      pathPoints = [allPositions.get(from)];
      for (var ci = 0; ci < chain.length; ci++) pathPoints.push(allPositions.get(chain[ci]));
      pathPoints.push(allPositions.get(to));
    } else {
      pathPoints = [allPositions.get(from), allPositions.get(to)];
    }
    var d = hasseEdgePath(pathPoints, edgeStyle);
    segments.push({ d: d, color: edgeColor, thickness: edgeThickness, opacity: edgeOpacity, dashed: false });
  }

  var routes = [{ nodes: topo, lane: 0, parentRoute: -1, depth: 0 }];
  var nodeRoute = new Map();
  var nodeLane = new Map();
  for (var i = 0; i < nodes.length; i++) {
    nodeRoute.set(nodes[i].id, 0);
    nodeLane.set(nodes[i].id, 0);
  }
  var centerY = (layoutMinY + layoutMaxY) / 2;

  return {
    positions: positions, routePaths: [segments], extraEdges: [],
    width: width, height: height, maxLayer: maxRank, routes: routes,
    nodeLane: nodeLane, nodeRoute: nodeRoute, laneSpacing: nodeSpacing,
    layerSpacing: rankSpacing, minY: layoutMinY, maxY: layoutMaxY,
    routeYScreen: new Map([[0, centerY]]), trunkYScreen: centerY,
    scale: s, theme: theme, orientation: 'ttb'
  };
}

// --- render.js (with TTB support) ---
function renderSVG(dag, layout, options) {
  options = options || {};
  var title = options.title;
  var diagonalLabels = options.diagonalLabels || false;
  var labelAngle = options.labelAngle || 45;
  var showLegend = options.showLegend !== false;
  var cssVars = options.cssVars || false;
  var labelSize = options.labelSize || 7;

  var defaultLegendLabels = { pure: 'Primary', recordable: 'Secondary', side_effecting: 'Tertiary', gate: 'Control' };
  var legendLabels = Object.assign({}, defaultLegendLabels, options.legendLabels || {});

  var theme = layout.theme || THEMES.cream;
  var col = {
    paper: theme.paper, ink: theme.ink, muted: theme.muted, border: theme.border,
    cls: function(c) { return theme.classes[c] || theme.classes.pure || theme.classes[Object.keys(theme.classes)[0]]; }
  };

  var positions = layout.positions, routePaths = layout.routePaths, extraEdges = layout.extraEdges;
  var width = layout.width, height = layout.height, routes = layout.routes, nodeRoute = layout.nodeRoute;
  var s = layout.scale || 1;
  var nodeMap = new Map(dag.nodes.map(function(n) { return [n.id, n]; }));
  var inDeg = new Map(), outDeg = new Map();
  dag.nodes.forEach(function(nd) { inDeg.set(nd.id, 0); outDeg.set(nd.id, 0); });
  dag.edges.forEach(function(e) { outDeg.set(e[0], outDeg.get(e[0]) + 1); inDeg.set(e[1], inDeg.get(e[1]) + 1); });

  var displayTitle = title || 'DAG (' + dag.nodes.length + ' nodes)';

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + ' ' + height + '" width="' + width + '" height="' + height + '" font-family="\'IBM Plex Mono\', \'Courier New\', monospace">\n';
  svg += '<rect width="' + width + '" height="' + height + '" fill="' + col.paper + '"/>\n';
  svg += '<text x="' + (24 * s) + '" y="' + (22 * s) + '" font-size="' + (14 * s) + '" fill="' + col.ink + '" letter-spacing="0.06em" opacity="0.5">' + displayTitle + '</text>\n';

  var subtitle = layout.orientation === 'ttb' ? 'Hasse diagram. Edges = covering relations.' : 'Topological layout. Colored lines = execution paths by node class.';
  svg += '<text x="' + (24 * s) + '" y="' + (38 * s) + '" font-size="' + (9 * s) + '" fill="' + col.muted + '">' + subtitle + '</text>\n';

  // Extra edges (behind)
  extraEdges.forEach(function(seg) {
    svg += '<path d="' + seg.d + '" stroke="' + seg.color + '" stroke-width="' + seg.thickness + '" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="' + seg.opacity + '"';
    if (seg.dashed) svg += ' stroke-dasharray="' + (4 * s) + ',' + (3 * s) + '"';
    svg += '/>\n';
  });

  // Route paths
  routePaths.forEach(function(segments) {
    segments.forEach(function(seg) {
      svg += '<path d="' + seg.d + '" stroke="' + seg.color + '" stroke-width="' + seg.thickness + '" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="' + seg.opacity + '"';
      if (seg.dashed) svg += ' stroke-dasharray="' + (4 * s) + ',' + (3 * s) + '"';
      svg += '/>\n';
    });
  });

  // Stations
  dag.nodes.forEach(function(nd) {
    var pos = positions.get(nd.id);
    if (!pos) return;
    var color = col.cls(nd.cls || 'pure');
    var isInterchange = (inDeg.get(nd.id) > 1 || outDeg.get(nd.id) > 1);
    var isGate = nd.cls === 'gate';
    var ri = nodeRoute.get(nd.id);
    var depth = (ri !== undefined && routes[ri]) ? routes[ri].depth : 0;
    var r;
    if (isInterchange) r = 5.5 * s;
    else if (depth <= 1) r = 3.5 * s;
    else r = 3 * s;

    svg += '<circle cx="' + pos.x.toFixed(1) + '" cy="' + pos.y.toFixed(1) + '" r="' + r + '" fill="' + col.paper + '" stroke="' + color + '" stroke-width="' + ((isGate ? 2 : 1.6) * s) + '"';
    if (isGate) svg += ' stroke-dasharray="' + (2 * s) + ',' + (1.5 * s) + '"';
    svg += '/>\n';

    if (isInterchange && !isGate) {
      svg += '<circle cx="' + pos.x.toFixed(1) + '" cy="' + pos.y.toFixed(1) + '" r="' + (2 * s) + '" fill="' + color + '" opacity="0.3"/>\n';
    }
    if (isGate) {
      svg += '<circle cx="' + pos.x.toFixed(1) + '" cy="' + pos.y.toFixed(1) + '" r="' + (2.2 * s) + '" fill="' + col.cls('gate') + '" opacity="0.4"/>\n';
    }

    // Labels
    var fs = labelSize * s;
    if (diagonalLabels) {
      var tickLen = 6 * s;
      var angle = -labelAngle;
      var rad = angle * Math.PI / 180;
      var tickEndX = pos.x + Math.cos(rad) * tickLen;
      var tickEndY = pos.y + Math.sin(rad) * tickLen;
      svg += '<line x1="' + pos.x.toFixed(1) + '" y1="' + (pos.y - r).toFixed(1) + '" x2="' + tickEndX.toFixed(1) + '" y2="' + (tickEndY - r).toFixed(1) + '" stroke="' + col.ink + '" stroke-width="' + (0.6 * s) + '" opacity="0.3"/>\n';
      var textX = tickEndX + 1 * s;
      var textY = tickEndY - r - 1 * s;
      svg += '<text x="' + textX.toFixed(1) + '" y="' + textY.toFixed(1) + '" font-size="' + (fs * 0.9) + '" fill="' + col.ink + '" text-anchor="start" opacity="0.55" transform="rotate(' + angle + ' ' + textX.toFixed(1) + ' ' + textY.toFixed(1) + ')">' + nd.label + '</text>\n';
    } else if (layout.orientation === 'ttb') {
      var labelX = pos.x + r + 4 * s;
      var labelY = pos.y + fs * 0.35;
      svg += '<text x="' + labelX.toFixed(1) + '" y="' + labelY.toFixed(1) + '" font-size="' + fs + '" fill="' + col.ink + '" text-anchor="start" opacity="0.55">' + nd.label + '</text>\n';
    } else {
      var labelY = pos.y + r + 8 * s;
      svg += '<text x="' + pos.x.toFixed(1) + '" y="' + labelY.toFixed(1) + '" font-size="' + fs + '" fill="' + col.ink + '" text-anchor="middle" opacity="0.55">' + nd.label + '</text>\n';
    }
  });

  // Legend
  if (showLegend) {
    var ly = height - 55 * s;
    svg += '<line x1="' + (24 * s) + '" y1="' + ly + '" x2="' + (width - 24 * s) + '" y2="' + ly + '" stroke="' + col.border + '" stroke-width="' + (0.3 * s) + '"/>\n';
    var vertSpread = layout.maxY - layout.minY;
    svg += '<text x="' + (24 * s) + '" y="' + (ly + 19 * s) + '" font-size="' + (8 * s) + '" fill="' + col.muted + '">' + dag.nodes.length + ' nodes | ' + dag.edges.length + ' edges | depth: ' + (layout.maxLayer + 1) + ' layers</text>\n';
  }

  svg += '</svg>';
  return svg;
}

// --- app ---
function render() {
  var latticeName = document.getElementById('latticeSelect').value;
  var themeName = document.getElementById('themeSelect').value;
  var edgeStyle = document.getElementById('edgeStyleSelect').value;
  var diagonalLabels = document.getElementById('diagonalLabels').checked;
  var labelAngle = parseInt(document.getElementById('labelAngle').value, 10);
  var labelSize = parseFloat(document.getElementById('labelSizeSlider').value);
  var scale = parseFloat(document.getElementById('scaleSlider').value);
  var rankSpacing = parseInt(document.getElementById('rankSpacingSlider').value, 10);
  var nodeSpacing = parseInt(document.getElementById('nodeSpacingSlider').value, 10);

  document.getElementById('angleControl').classList.toggle('visible', diagonalLabels);
  document.getElementById('angleValue').textContent = labelAngle + '\u00B0';
  document.getElementById('labelSizeValue').textContent = labelSize;
  document.getElementById('scaleValue').textContent = scale;
  document.getElementById('rankSpacingValue').textContent = rankSpacing;
  document.getElementById('nodeSpacingValue').textContent = nodeSpacing;

  var resolved = resolveTheme(themeName);
  var root = document.documentElement;
  root.style.setProperty('--dm-paper', resolved.paper);
  root.style.setProperty('--dm-ink', resolved.ink);
  root.style.setProperty('--dm-muted', resolved.muted);
  root.style.setProperty('--dm-border', resolved.border);

  var dag = LATTICES[latticeName]();
  var calloutEl = document.getElementById('callout');
  if (dag.notes) {
    calloutEl.innerHTML = dag.notes;
    calloutEl.style.display = '';
  } else {
    calloutEl.innerHTML = '<h3>' + (dag.label || latticeName) + '</h3><p class="dm-subtitle">' + (dag.description || '') + '</p>';
    calloutEl.style.display = '';
  }

  var layoutOpts = { theme: themeName, scale: scale, rankSpacing: rankSpacing, nodeSpacing: nodeSpacing, edgeStyle: edgeStyle };
  var renderOpts = { title: dag.label || latticeName, diagonalLabels: diagonalLabels, labelAngle: labelAngle, labelSize: labelSize, showLegend: true };

  var layout = layoutHasse(dag, layoutOpts);
  var svg = renderSVG(dag, layout, renderOpts);
  document.getElementById('mapContainer').innerHTML = svg;

  // Code snippet
  var lo = {};
  if (themeName !== 'mono') lo.theme = themeName;
  if (scale !== 1.5) lo.scale = scale;
  if (rankSpacing !== 80) lo.rankSpacing = rankSpacing;
  if (nodeSpacing !== 60) lo.nodeSpacing = nodeSpacing;
  if (edgeStyle !== 'bezier') lo.edgeStyle = edgeStyle;
  var ro = {};
  if (diagonalLabels) ro.diagonalLabels = true;
  if (diagonalLabels && labelAngle !== 45) ro.labelAngle = labelAngle;
  if (labelSize !== 7) ro.labelSize = labelSize;

  var loStr = Object.keys(lo).length ? ', ' + JSON.stringify(lo, null, 2) : '';
  var roStr = Object.keys(ro).length ? ', ' + JSON.stringify(ro, null, 2) : '';
  var code = 'const layout = layoutHasse(dag' + loStr + ');\nconst svg = renderSVG(dag, layout' + roStr + ');';

  function highlight(src) {
    return src
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\b(const|let|var)\b/g, '<span style="color:#CF222E">$1</span>')
      .replace(/\b(layoutHasse|renderSVG)\b/g, '<span style="color:#8250DF">$1</span>')
      .replace(/\b(dag|layout|svg)\b/g, '<span style="color:#953800">$1</span>')
      .replace(/"([^"]+)"\s*:/g, '<span style="color:#0550AE">"$1"</span>:')
      .replace(/:\s*"([^"]+)"/g, ': <span style="color:#0A3069">"$1"</span>')
      .replace(/:\s*(true|false)/g, ': <span style="color:#CF222E">$1</span>')
      .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#0550AE">$1</span>');
  }
  document.getElementById('optionsBlock').innerHTML = highlight(code);
}

['latticeSelect', 'themeSelect', 'edgeStyleSelect'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', render);
});
['diagonalLabels'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', render);
});
['labelAngle', 'labelSizeSlider', 'scaleSlider', 'rankSpacingSlider', 'nodeSpacingSlider'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', render);
});
render();
</script>
